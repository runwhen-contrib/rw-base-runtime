# Sample OpenTelemetry Collector configuration for scraping RunWhen runtime metrics
# This configuration shows how to scrape the Prometheus metrics exposed by the runtime

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'runwhen-runtime'
          static_configs:
            - targets: ['localhost:8000']  # Default port for runtime metrics
          scrape_interval: 15s
          metrics_path: /metrics
          scheme: http
          # Optional: Add additional labels
          relabel_configs:
            - source_labels: [__address__]
              target_label: instance
            - source_labels: []
              target_label: service
              replacement: 'runwhen-runtime'

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  
  # Optional: Add resource attributes
  resource:
    attributes:
      - key: service.name
        value: runwhen-runtime
        action: insert
      - key: service.version
        value: v1
        action: insert

exporters:
  # Example: Export to Prometheus remote write
  prometheusremotewrite:
    endpoint: "https://your-prometheus-endpoint/api/v1/write"
    headers:
      Authorization: "Bearer your-token"
  
  # Example: Export to OTLP
  otlp:
    endpoint: "https://your-otlp-endpoint:4317"
    headers:
      Authorization: "Bearer your-token"
  
  # Example: Export to logging for debugging
  logging:
    loglevel: debug

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [batch, resource]
      exporters: [logging, prometheusremotewrite]  # Add your desired exporters
  
  # Optional: Configure extensions
  extensions: []
  
  # Optional: Configure telemetry
  telemetry:
    logs:
      level: "info"
    metrics:
      level: "basic"
      address: 0.0.0.0:8888 