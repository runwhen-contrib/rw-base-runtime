name: Build And Push

# Builds the rw-base-runtime image and pushes it to GHCR.
#
# Tag schema (mirrored verbatim by cc-registry-v2's OCISource and used as
# the `rt_sha` suffix by every codecollection image build):
#
#   <sha7>            – every build (e.g. "c1a2b3d")
#   <full-sha>        – every build, full 40-char sha
#   main / latest     – push to main
#   pr-<n>            – pull_request builds
#   <ref>             – git tags (e.g. "v1.2.0")
#
# `cc-registry-v2`'s `OCISource` ingests these tags; PAPI resolves them
# through the catalog API.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      worker_image:
        description: "Override WORKER_IMAGE (full image ref). Leave blank to use the Dockerfile default."
        required: false
        default: ""
        type: string
      base_py_image:
        description: "Override BASE_PY_IMAGE (upstream Python base)."
        required: false
        default: ""
        type: string
      push:
        description: "Push the resulting image to GHCR."
        required: false
        default: true
        type: boolean
      platforms:
        description: "Comma-separated buildx platforms."
        required: false
        default: "linux/amd64,linux/arm64"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ----------------------------------------------------------------
      # Compute the tag set this build will publish.
      # ----------------------------------------------------------------
      - name: Compute tags
        id: meta
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"
          sha7="${sha:0:7}"
          repo_lc="$(echo "${{ env.REGISTRY }}/${{ env.IMAGE }}" | tr '[:upper:]' '[:lower:]')"
          tags=( "${repo_lc}:${sha}" "${repo_lc}:${sha7}" )
          case "${{ github.event_name }}" in
            push)
              if [ "${{ github.ref_type }}" = "tag" ]; then
                tags+=( "${repo_lc}:${{ github.ref_name }}" )
              else
                # push to a branch (main)
                tags+=( "${repo_lc}:${{ github.ref_name }}" "${repo_lc}:latest" )
              fi
              ;;
            pull_request)
              tags+=( "${repo_lc}:pr-${{ github.event.pull_request.number }}" )
              ;;
          esac
          {
            echo "repo_lc=${repo_lc}"
            echo "sha=${sha}"
            echo "sha7=${sha7}"
            # Comma-separated for docker/build-push-action's `tags:` input.
            printf 'tags=%s\n' "$(IFS=,; echo "${tags[*]}")"
          } >> "$GITHUB_OUTPUT"

          echo "## Will publish"          >> "$GITHUB_STEP_SUMMARY"
          for t in "${tags[@]}"; do
            echo "- \`${t}\`"             >> "$GITHUB_STEP_SUMMARY"
          done

      # ----------------------------------------------------------------
      # Resolve dispatch overrides into build args we'll feed buildx.
      # ----------------------------------------------------------------
      - name: Resolve build args
        id: args
        env:
          IN_WORKER: ${{ inputs.worker_image }}
          IN_BASE_PY: ${{ inputs.base_py_image }}
        run: |
          set -euo pipefail
          {
            if [ -n "${IN_WORKER:-}" ];  then echo "worker_arg=WORKER_IMAGE=${IN_WORKER}"; fi
            if [ -n "${IN_BASE_PY:-}" ]; then echo "base_py_arg=BASE_PY_IMAGE=${IN_BASE_PY}"; fi
          } >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Decide if we push. Pushes happen on push events (branch/tag),
      # and on dispatch when `push` is true. PRs do NOT push by default
      # to avoid burning GHCR retention on every commit; flip the input
      # when a PR build needs to be consumed by cc-registry-v2.
      #
      # The push flag also gates whether we bother running the multi-arch
      # build at all -- there is no value in burning ~15min of QEMU-emulated
      # arm64 builds just to discard the result on a PR.
      # ----------------------------------------------------------------
      - name: Determine push flag
        id: push_flag
        run: |
          case "${{ github.event_name }}" in
            push)
              echo "should_push=true" >> "$GITHUB_OUTPUT" ;;
            pull_request)
              echo "should_push=false" >> "$GITHUB_OUTPUT" ;;
            workflow_dispatch)
              echo "should_push=${{ inputs.push }}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "should_push=false" >> "$GITHUB_OUTPUT" ;;
          esac

      # QEMU is only needed for the multi-arch (arm64) build step. Skip
      # it on PRs so we don't pay the setup cost when we wouldn't use it.
      - name: Set up QEMU (multi-arch)
        if: steps.push_flag.outputs.should_push == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.push_flag.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Smoke build (native amd64, loaded into docker for exec testing).
      #
      # Caching strategy:
      #   cache-from / cache-to = type=gha (GitHub Actions cache backend)
      #   scope=rw-base-runtime
      #
      # The cache backend is shared with the multi-arch build below, so:
      #   - First run after the cache is empty: full build (~10 min).
      #   - Subsequent runs: only the layers that actually changed rebuild.
      #     The expensive stages (rust `cargo install linear-cli`, cloud SDK
      #     downloads, apt installs) hit cache and are ~free.
      #   - Within this single run: the multi-arch step reuses the amd64
      #     layers this step just produced (same buildx builder + same gha
      #     scope = no rebuild).
      #
      # We explicitly pin platforms: linux/amd64 here so the smoke build
      # never accidentally enters QEMU emulation just because the runner
      # arch shifts in the future.
      # ----------------------------------------------------------------
      - name: Build (smoke, native, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: rw-base-runtime:smoke
          cache-from: type=gha,scope=rw-base-runtime
          cache-to: type=gha,mode=max,scope=rw-base-runtime
          build-args: |
            ${{ steps.args.outputs.worker_arg }}
            ${{ steps.args.outputs.base_py_arg }}

      - name: Smoke test image
        run: |
          set -euo pipefail
          # Verify the rw-core-keywords install + helper script layout
          # without running the real worker entrypoint. The set of imports
          # below covers the modules that ship in the current PyPI release:
          # RW.Core (keyword surface), RW.platform (platform client),
          # RW.fetchsecrets (the canonical secret-resolution entry point
          # per AGENTS.md in platform-robot-runtime).
          docker run --rm --entrypoint /bin/bash rw-base-runtime:smoke -c '
            set -eux
            python3 -c "import RW.Core, RW.platform, RW.fetchsecrets, robot"
            robot --version || true
            test -x /home/runwhen/worker
            test -x /home/runwhen/robot-runtime/entrypoint.sh
            test -f /home/runwhen/robot-runtime/runrobot.py
            test -f /home/runwhen/robot-runtime/metrics_daemon.py
            python3 -c "import psutil; print(psutil.__version__)"
            kubectl version --client=true || true
            aws --version
            helm version --short
            az version || true
            gcloud --version
            linear-cli --version || true
            claude --version || true
          '

      # ----------------------------------------------------------------
      # Multi-arch build that publishes the canonical tags.
      #
      # Skipped entirely on PRs (should_push == false) -- there's no
      # point spending ~15min on emulated arm64 just to discard the
      # output. arm64 regressions get caught on the first push to main
      # after merge; if you need to validate arm64 from a PR, dispatch
      # this workflow with push=true.
      #
      # Cache: reuses the amd64 layers the smoke build wrote moments ago
      # (same buildx instance + same gha scope), and writes back the
      # arm64 layers so the next run pays the QEMU price only for new
      # changes.
      # ----------------------------------------------------------------
      - name: Build & push (multi-arch)
        if: steps.push_flag.outputs.should_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.runwhen.runtime.commit=${{ github.sha }}
          cache-from: type=gha,scope=rw-base-runtime
          cache-to: type=gha,mode=max,scope=rw-base-runtime
          build-args: |
            ${{ steps.args.outputs.worker_arg }}
            ${{ steps.args.outputs.base_py_arg }}

      - name: Summary
        run: |
          {
            echo "## rw-base-runtime build"
            echo
            echo "- Event:    \`${{ github.event_name }}\`"
            echo "- Ref:      \`${{ github.ref }}\`"
            echo "- Sha:      \`${{ github.sha }}\`"
            echo "- Pushed:   \`${{ steps.push_flag.outputs.should_push }}\`"
            echo "- Platforms: \`${{ inputs.platforms || 'linux/amd64,linux/arm64' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
